model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

# "untrusted": solo auto-aprueba comandos de solo lectura conocidos como seguros;
# el resto (rm -rf, git clean -f, etc.) requiere aprobación explícita del usuario.
# Valores válidos: "untrusted" | "on-request" | "never"
# Fuente: codex-rs/protocol/src/protocol.rs (AskForApproval)
approval_policy = "untrusted"

# "workspace-write": el agente puede escribir en el workspace pero no fuera de él.
# Valores válidos: "read-only" | "workspace-write" | "danger-full-access"
# Fuente: codex-rs/protocol/src/config_types.rs (SandboxMode)
sandbox_mode = "workspace-write"

[features]
multi_agent = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[mcp_servers.notion]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server"]
env_vars = ["NOTION_TOKEN"]
enabled = true

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
enabled = true

[mcp_servers.tavily]
command = "npx"
args = ["-y", "tavily-mcp"]
env_vars = ["TAVILY_API_KEY"]
enabled = true

[mcp_servers.openalex]
command = "npx"
args = ["-y", "openalex-research-mcp"]
enabled = true

[mcp_servers.zotero]
command = "uvx"
args = ["zotero-mcp"]
enabled = true

[mcp_servers.zotero.env]
ZOTERO_LOCAL = "true"
