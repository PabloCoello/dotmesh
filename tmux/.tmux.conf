# BeTheme/Material-inspired tmux config

set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color:RGB'
set -g mouse on
set -g history-limit 10000
set -g focus-events on
set -g allow-passthrough on  # enable kitty/ghostty passthrough (images, etc.)
set -sg escape-time 0        # make Esc-prefixed keys (Meta) feel instant
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Colors
set -g status-style "bg=#1A191E,fg=#C5C9CE"
set -g message-style "bg=#FFAA7A,fg=#1A191E"
set -g message-command-style "bg=#FFAA7A,fg=#1A191E"
set -g pane-border-style "fg=#23242A"
set -g pane-active-border-style "fg=#FFAA7A"

# Status line
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 32
set -g status-right-length 80
set -g status-left '#[bg=#FFAA7A,fg=#1A191E,bold] #S #[default]#[bg=#1A191E,fg=#FFAA7A]'
set -g status-right '#[fg=#C5C9CE,bg=#1A191E]#[bg=#1A191E,fg=#FFAA7A] %Y-%m-%d #[fg=#66D9B8]%H:%M #[default]'
setw -g window-status-current-style "bg=#23242A,fg=#FFAA7A,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "bg=#1A191E,fg=#C5C9CE"
setw -g window-status-format " #I:#W "

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Keys
bind r source-file ~/.tmux.conf \; display "Reloaded tmux.conf"

# Splits (más cómodos en teclado ES)
bind v split-window -h   # vertical: lado a lado
bind s split-window -v   # horizontal: arriba/abajo

# Navegación con hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy to system clipboard on macOS
set -g set-clipboard on
