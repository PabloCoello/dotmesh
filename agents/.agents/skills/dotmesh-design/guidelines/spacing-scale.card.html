<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); padding: 24px 26px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gray-950); border-radius: var(--radius-xs); width: 16px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="v">4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="v">8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="v">12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="v">16</span></div>
    <div class="item"><div class="bar" style="height:20px"></div><span class="v">20</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="v">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="v">32</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="v">40</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="v">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="v">64</span></div>
  </div>
</body>
</html>
