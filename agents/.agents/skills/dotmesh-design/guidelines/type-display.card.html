<!-- @dsCard group="Type" viewport="700x220" name="Display & Headings" subtitle="Hanken Grotesk · tight tracking, lots of air" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); padding: 24px 26px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 96px; flex: none; }
  .dxl { font-size: var(--t-display); font-weight: var(--w-black); letter-spacing: var(--tracking-display); line-height: 1; }
  .h1 { font-size: var(--t-h1); font-weight: var(--w-bold); letter-spacing: var(--tracking-tight); }
  .h2 { font-size: var(--t-h2); font-weight: var(--w-semibold); letter-spacing: var(--tracking-tight); }
  .h3 { font-size: var(--t-h3); font-weight: var(--w-semibold); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="spec">40 / 800</span><span class="dxl">Paper, ink, syntax</span></div>
    <div class="line"><span class="spec">32 / 700</span><span class="h1">Coherent across every surface</span></div>
    <div class="line"><span class="spec">24 / 600</span><span class="h2">From the prompt to the editor</span></div>
    <div class="line"><span class="spec">19 / 600</span><span class="h3">One language, quietly applied</span></div>
  </div>
</body>
</html>
