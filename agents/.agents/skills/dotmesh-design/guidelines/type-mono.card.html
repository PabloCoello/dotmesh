<!-- @dsCard group="Type" viewport="700x180" name="JetBrains Mono" subtitle="The signature voice — code, prompts, metadata, ligatures on" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--ink-0); color: #e9eaec; padding: 24px 26px; font-size: 14px; line-height: var(--lh-code); font-feature-settings: "calt" 1, "liga" 1; }
  .c1 { color: var(--syntax-lilac); }
  .c2 { color: var(--syntax-blue); }
  .c3 { color: var(--syntax-sage); }
  .c4 { color: var(--syntax-peach); }
  .cm { color: #6a6d74; }
  .row { display: flex; gap: 18px; margin-top: 14px; font-size: 18px; color: var(--syntax-teal); }
  .lab { font-size: 10px; color: #6a6d74; letter-spacing: .14em; text-transform: uppercase; }
</style>
</head>
<body>
  <div><span class="c1">const</span> <span class="c2">mesh</span> = <span class="c4">await</span> <span class="c2">load</span>(<span class="c3">"~/.config"</span>); <span class="cm">// =&gt; ok</span></div>
  <div class="row">
    <span>-&gt;</span><span>=&gt;</span><span>!=</span><span>&gt;=</span><span>===</span><span>|&gt;</span><span>::</span><span>...</span>
  </div>
  <div class="lab" style="margin-top:8px;">JetBrains Mono · ligatures + nerd-font glyphs</div>
</body>
</html>
