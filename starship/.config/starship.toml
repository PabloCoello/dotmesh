"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'dotmesh'

# dotmesh — Paper · Ink · Syntax.
# Cromo monocromo: los segmentos del powerline usan la rampa Graphite y el
# texto va en Ink claro; los iconos llevan el acento de sintaxis (señal).
# Para volver al tema anterior: palette = 'gruvbox_dark'.
[palettes.dotmesh]
color_fg0    = '#eaeaea'   # texto sobre los segmentos (Ink claro)
color_orange = '#2e2e2e'   # segmento 1 — os / usuario
color_yellow = '#383838'   # segmento 2 — directorio
color_aqua   = '#424242'   # segmento 3 — git
color_blue   = '#4d4d4d'   # segmento 4 — lenguajes
color_bg3    = '#545454'   # segmento 5 — docker / conda
color_bg1    = '#5c5c5c'   # segmento 6 — hora
color_green  = '#A8CBA0'   # sage  — prompt ok
color_red    = '#E59A9A'   # rose  — prompt error
color_purple = '#CBAACB'   # lilac — vim replace
# iconos: señal de sintaxis sobre el cromo grafito
color_ico_peach = '#FFAA7A'
color_ico_sage  = '#A8CBA0'
color_ico_blue  = '#8FB4E3'

[palettes.gruvbox_dark]
color_bg1= '#D1D3D4'
color_fg0= '#1A191E'
color_bg3 = '#665c54'
color_blue = '#4F80DD'
color_aqua = '#58B69D'
color_green = '#58B69D'
color_orange = '#E27056'
color_purple = '#CBAACB'
color_red = '#E27056'
color_yellow = '#E5B15D'

[os]
disabled = false
style = "bg:color_orange fg:color_ico_peach"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol ](fg:color_ico_sage bg:color_aqua)[$branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_ico_peach bg:color_aqua)]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_ico_blue bg:color_blue)[( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol ](fg:color_ico_blue bg:color_bg3)[( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol ](fg:color_ico_blue bg:color_bg3)[( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol ](fg:color_ico_blue bg:color_bg3)[( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
