"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](color_orange)\
$os\
$username\
[Ņé░](bg:color_yellow fg:color_orange)\
$directory\
[Ņé░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[Ņé░](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[Ņé░](fg:color_bg3 bg:color_bg1)\
$time\
[Ņé┤ ](fg:color_bg1)\
$line_break$character"""

palette = 'dotmesh'

# dotmesh ŌĆö Paper ┬Ę Ink ┬Ę Syntax.
# Cromo monocromo: los segmentos del powerline usan la rampa Graphite y el
# texto va en Ink claro; los iconos llevan el acento de sintaxis (se├▒al).
# Para volver al tema anterior: palette = 'gruvbox_dark'.
[palettes.dotmesh]
color_fg0    = '#eaeaea'   # texto sobre los segmentos (Ink claro)
color_orange = '#2e2e2e'   # segmento 1 ŌĆö os / usuario
color_yellow = '#383838'   # segmento 2 ŌĆö directorio
color_aqua   = '#424242'   # segmento 3 ŌĆö git
color_blue   = '#4d4d4d'   # segmento 4 ŌĆö lenguajes
color_bg3    = '#545454'   # segmento 5 ŌĆö docker / conda
color_bg1    = '#5c5c5c'   # segmento 6 ŌĆö hora
color_green  = '#A8CBA0'   # sage  ŌĆö prompt ok
color_red    = '#E59A9A'   # rose  ŌĆö prompt error
color_purple = '#CBAACB'   # lilac ŌĆö vim replace
# iconos: se├▒al de sintaxis sobre el cromo grafito
color_ico_peach = '#FFAA7A'
color_ico_teal  = '#6CB6B0'
color_ico_sage  = '#A8CBA0'
color_ico_blue  = '#8FB4E3'
color_ico_muted = '#9e9e9e'

[palettes.gruvbox_dark]
color_bg1= '#D1D3D4'
color_fg0= '#1A191E'
color_bg3 = '#665c54'
color_blue = '#4F80DD'
color_aqua = '#58B69D'
color_green = '#58B69D'
color_orange = '#E27056'
color_purple = '#CBAACB'
color_red = '#E27056'
color_yellow = '#E5B15D'

[os]
disabled = false
style = "bg:color_orange fg:color_ico_peach"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
